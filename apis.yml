apis:
  - aid: buildxact:buildxact-public-api
    name: Buildxact Public API
    description: >-
      Buildxact's public REST API exposes core construction-job data including estimates and estimate items, with
      related tax-context and reference data. The API is fronted by Azure API Management; every request must carry an
      Ocp-Apim-Subscription-Key header identifying the partner organization and an Authorization: Bearer access token
      scoped to a Buildxact user and tenant. Endpoints follow REST conventions with OData query support — $filter,
      $orderBy, $top, $skip, and $count=true (record total returned via the x-odata-total-count response header). A
      staging environment is available at developer-uat.buildxact.com. Rate-limited at 100 requests per 30-second
      window.
    humanURL: https://developer.buildxact.com/apis
    baseURL: https://api.buildxact.com
    version: v3
