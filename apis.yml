  - aid: buildxact:buildxact-webhooks
    name: Buildxact Webhooks
    description: >-
      Buildxact's webhook surface lets partner and customer integrations receive real-time notifications when events
      occur inside the construction-management platform — including Estimate Accepted, Lead Created, and Lead Updated,
      plus additional event types reserved for Merchant and Manufacturer plan tiers. Webhooks are registered from the
      "My Business > API" panel of the Buildxact web app: provide a destination URL, choose events, store the signing
      secret used to verify payload authenticity, and inspect deliveries via the built-in Event Log. Payloads are JSON
      over HTTPS.
    humanURL: https://developer.buildxact.com/webhooks
    version: v1
