aid: buildxact
name: Buildxact
description: >-
  Buildxact is a Melbourne, Australia-headquartered construction estimating and project management SaaS for residential
  builders, remodelers, trade contractors, and building-material suppliers. Founded in 2011, the company operates
  regional offices in Austin, Texas (North America), and serves customers across Australia, New Zealand, the United
  Kingdom, the United States, and Canada. The platform spans the full residential job lifecycle — lead capture, digital
  takeoffs, AI-assisted estimating ("Blu"), customer quoting and e-signatures, supplier/dealer price-list integration,
  purchase orders, scheduling (Gantt), timesheets, variations/change orders, invoicing, and two-way accounting sync with
  Xero and QuickBooks Online. Buildxact exposes a public REST API and webhook surface at developer.buildxact.com,
  available to Merchant and Manufacturer partners as well as customer subscribers, using a Microsoft Azure API
  Management gateway (Ocp-Apim-Subscription-Key + bearer token). Endpoints support OData filtering and sorting, with a
  separate UAT/staging environment. In 2024, Autodesk announced an agreement to acquire Buildxact, positioning the
  product as a residential construction front-end alongside Autodesk's broader AEC portfolio.
